services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eaida}
      POSTGRES_USER: ${POSTGRES_USER:-eaida}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eaida}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-eaida}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-eaida}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      FAISS_INDEX_PATH: /app/embeddings/schema_index
      SQL_TIMEOUT_SECONDS: ${SQL_TIMEOUT_SECONDS:-30}
      SQL_ROW_LIMIT: ${SQL_ROW_LIMIT:-500}
      CONVERSATION_HISTORY_LIMIT: ${CONVERSATION_HISTORY_LIMIT:-10}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    volumes:
      - embeddings:/app/embeddings
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  embeddings:
