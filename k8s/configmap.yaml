apiVersion: v1
kind: ConfigMap
metadata:
  name: eaida-config
  namespace: eaida
data:
  POSTGRES_DB: "eaida"
  POSTGRES_USER: "eaida"
  SQL_TIMEOUT_SECONDS: "30"
  SQL_ROW_LIMIT: "500"
  FAISS_INDEX_PATH: "/app/embeddings/schema_index"
  CONVERSATION_HISTORY_LIMIT: "10"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
