apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: eaida
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: eaida/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: eaida-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: eaida-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: eaida-secrets
                  key: SECRET_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: eaida-secrets
                  key: GEMINI_API_KEY
          volumeMounts:
            - name: embeddings
              mountPath: /app/embeddings
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: embeddings
          emptyDir: {}
